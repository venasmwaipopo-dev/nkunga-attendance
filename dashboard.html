<!DOCTYPE html>
<html>
<head>
  <h2 style="text-align:center; color:#0d6efd; font-weight:bold;">
NKUNGA SEC SCHOOL<br>
TEACHERS ATTENDANCE SYSTEM
</h2>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f2f4f8;
            font-family: Arial;
        }

        .app-header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 0 0 20px 20px;
        }

        .welcome-card {
            background: #198754;
            color: white;
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .checkin-btn {
            width: 90%;
            margin: 10px auto;
            display: block;
            padding: 12px;
            font-size: 18px;
            border-radius: 12px;
        }

        .card-box {
            margin: 15px;
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .late {
            color: red;
            font-weight: bold;
        }

        .early {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="app-header">
    📚 Teachers Dashboard
</div>

<div class="welcome-card">
    Welcome, {{ user[0] }}
</div>

<form action="/checkin" method="POST">
    <button class="btn btn-primary checkin-btn">
        📍 Check In
    </button>
</form>

<div class="card-box">

    <table class="table table-striped">

        <thead>
            <tr>
                <th>Teacher</th>
                <th>Subject</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>

        {% for r in records %}
            <tr>
                <td>{{ r[0] }}</td>
                <td>{{ r[1] }}</td>
                <td>{{ r[2] }}</td>

                <td>
                    {% if "Earlier" in r[3] %}
                        <span class="early">{{ r[3] }}</span>
                    {% else %}
                        <span class="late">{{ r[3] }}</span>
                    {% endif %}
                </td>
            </tr>
        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
