<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance Report</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 900px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table, th, td {
      border: 1px solid #ccc;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    th {
      background: #007bff;
      color: white;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }

    .btn:hover {
      background: #1e7e34;
    }

    .back {
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="container">

    <h2>Attendance Report</h2>

    <table>
      <tr>
        <th>#</th>
        <th>Teacher Name</th>
        <th>Subject</th>
        <th>Check-in Time</th>
        <th>Status</th>
      </tr>

      {% for r in records %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ r.teacher_name }}</td>
        <td>{{ r.subject }}</td>
        <td>{{ r.checkin_time }}</td>
        <td>{{ r.status }}</td>
      </tr>
      {% endfor %}

    </table>

    <div class="back">
      <a href="/dashboard" class="btn">Back to Dashboard</a>
    </div>

  </div>

</body>
</html>
