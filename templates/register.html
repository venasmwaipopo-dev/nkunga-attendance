<!DOCTYPE html>
<html>
<head>
    <title>Create Teacher Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            margin: 0;
            font-family: Arial;
        }

        .topbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            z-index: 1000;
        }

        .page {
            padding-top: 80px;
        }
    </style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    NKUNGA SEC.SCHOOL TEACHER'S ATTENDANCE SYSTEM
</div>

<div class="page">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <!-- ALERTS -->
            {% if msg %}
            <div class="alert alert-danger text-center mt-3">
                {{ msg }}
            </div>
            {% endif %}

            {% if success %}
            <div class="alert alert-success text-center mt-3">
                {{ success }}
            </div>

            <div class="text-center mt-2">
                <a href="/" class="btn btn-primary w-100">
                    Go to Login
                </a>
            </div>
            {% endif %}

            <!-- CARD -->
            <div class="card shadow-lg mt-3 border-0 rounded-4">

                <div class="card-body p-5">

                    <h3 class="text-center text-primary mb-4">
                        Create Teacher Account
                    </h3>

                    <form action="/save_register" method="POST">

                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" name="fullname" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Subject</label>
                            <input type="text" name="subject" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Create Account
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none">Back to Login</a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
