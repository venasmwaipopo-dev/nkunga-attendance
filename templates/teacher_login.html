<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        }

        /* TOPBAR */
        .topbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: bold;
            z-index: 1000;
        }

        /* CENTER BOX */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 60px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1e8449;
        }

        .links {
            margin-top: 10px;
            text-align: center;
        }

        .links a {
            display: block;
            margin-top: 8px;
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>

<body>

<!-- TOP BAR (constant) -->
<div class="topbar">
    NKUNGA SEC.SCHOOL TEACHER'S ATTENDANCE SYSTEM
</div>

<div class="container">
    <div class="box">
        <h2>Teacher Login</h2>

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="/register">➕ Create Account</a>
            <a href="/forgot_password">🔑 Forgot Password?</a>
        </div>
    </div>
</div>

</body>
</html>
