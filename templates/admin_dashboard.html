<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f1f2f6;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
        }

        .main {
            margin-left: 220px;
            padding: 30px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>⚙ Admin Panel</h3>
    <a href="/dashboard">Dashboard</a>
    <a href="/attendance">Attendance</a>
    <a href="/reports">Reports</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

    <div class="box">
        <h2>Welcome Admin 👨‍💼</h2>
        <p>Manage system activities here</p>
    </div>

    <div class="box">
        <h3>📊 Quick Stats</h3>
        <p>Total Teachers: ...</p>
        <p>Total Students: ...</p>
    </div>

</div>

</body>
</html>
