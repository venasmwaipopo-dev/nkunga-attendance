<h2>Attendance Report</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Check In Time</th>
        <th>Status</th>
    </tr>

    {% for row in records %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}
</table>
{% if msg %}
    <div class="alert alert-success text-center">
        {{ msg }}
    </div>
{% endif %}
