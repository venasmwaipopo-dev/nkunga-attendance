<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-3">

<h2 class="text-center text-danger">ADMIN DASHBOARD</h2>

<a href="/logout" class="btn btn-dark mb-3">Logout</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Teacher</th>
            <th>Subject</th>
            <th>Time</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for r in records %}
        <tr>
            <td>{{ r.teacher_name }}</td>
            <td>{{ r.subject }}</td>
            <td>{{ r.checkin_time }}</td>
            <td>{{ r.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
